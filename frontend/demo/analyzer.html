<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <title>AEO/GEO Analyzer</title>
  <style>
    :root {
      color-scheme: dark;
      --page-plane: #0d0d0d;
      --surface-1: #1a1a19;
      --surface-2: #21201d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --border: rgba(255, 255, 255, 0.1);
      --accent: #3987e5;
      --accent-2: #4a3aa7;
      --accent-hover: #2a78d6;
      --status-critical: #e66767;
      --shadow: rgba(0, 0, 0, 0.35);
      --glow: rgba(57, 135, 229, 0.16);
    }

    @media (prefers-color-scheme: light) {
      :root {
        color-scheme: light;
        --page-plane: #f9f9f7;
        --surface-1: #fcfcfb;
        --surface-2: #f3f2ee;
        --text-primary: #0b0b0b;
        --text-secondary: #52514e;
        --text-muted: #898781;
        --border: rgba(11, 11, 11, 0.1);
        --accent: #2a78d6;
        --accent-2: #4a3aa7;
        --accent-hover: #184f95;
        --status-critical: #d03b3b;
        --shadow: rgba(11, 11, 11, 0.08);
        --glow: rgba(42, 120, 214, 0.1);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--page-plane);
      background-image: radial-gradient(600px 300px at 15% 0%, var(--glow), transparent 70%);
      background-repeat: no-repeat;
      color: var(--text-primary);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 48px 20px 80px;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      animation: aeo-fade-in 0.5s ease both;
    }

    @keyframes aeo-fade-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .source-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .source-link:hover {
      color: var(--text-primary);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .source-link svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .brand__mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #ffffff;
      display: block;
      object-fit: contain;
      flex-shrink: 0;
      box-shadow: 0 4px 14px -6px var(--shadow);
    }

    .brand__name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    h1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
    }

    .subtitle {
      color: var(--text-secondary);
      margin: 0 0 28px;
      font-size: 15px;
      line-height: 1.5;
    }

    .analyzer-form {
      display: flex;
      gap: 8px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px;
      box-shadow: 0 1px 2px var(--shadow), 0 8px 24px -10px var(--shadow);
      transition: box-shadow 0.2s ease;
    }

    .analyzer-form:focus-within {
      box-shadow: 0 0 0 3px var(--glow), 0 8px 24px -10px var(--shadow);
    }

    .analyzer-form input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
    }

    .analyzer-form input::placeholder {
      color: var(--text-muted);
    }

    .analyzer-form input.is-invalid {
      color: var(--status-critical);
    }

    .analyzer-form button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 1px 2px var(--shadow);
      transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    .analyzer-form button:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px -2px var(--shadow);
    }

    .analyzer-form button:active:not(:disabled) {
      transform: translateY(0);
    }

    .analyzer-form button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .field-error {
      color: var(--status-critical);
      font-size: 13px;
      margin: 8px 0 0;
      min-height: 16px;
    }

    #widget-slot {
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="brand">
        <img class="brand__mark" src="/images/logo.png" alt="AEO/GEO Toolkit logo" />
        <div class="brand__name">AEO/GEO Toolkit</div>
      </div>
      <a
        class="source-link"
        href="https://github.com/YEESWANTH2004/Aeo-Geo"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
            -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07
            -1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21
            2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16
            1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
            0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        Source Code
      </a>
    </div>

    <h1>Analyze any website</h1>
    <p class="subtitle">Paste a public URL to scrape it, score it for AEO/GEO, and generate a ready-to-use llms.txt.</p>

    <form class="analyzer-form" id="analyzer-form" novalidate>
      <input
        type="text"
        id="url-input"
        placeholder="https://example.com"
        autocomplete="off"
      />
      <button type="submit" id="analyze-button">Analyze</button>
    </form>
    <p class="field-error" id="field-error"></p>

    <div id="widget-slot"></div>
  </div>

  <script>
    const API_BASE = "https://aeo-geo-backend.onrender.com";
    const form = document.getElementById("analyzer-form");
    const input = document.getElementById("url-input");
    const button = document.getElementById("analyze-button");
    const fieldError = document.getElementById("field-error");
    const slot = document.getElementById("widget-slot");

    function normalizeUrl(value) {
      const trimmed = value.trim();
      if (!trimmed) return null;
      if (!/^https?:\/\//i.test(trimmed)) return `https://${trimmed}`;
      return trimmed;
    }

    function isPlausibleUrl(value) {
      try {
        new URL(value);
        return true;
      } catch {
        return false;
      }
    }

    function setBusy(isBusy) {
      button.disabled = isBusy;
      button.textContent = isBusy ? "Analyzing…" : "Analyze";
    }

    function watchForCompletion() {
      const observer = new MutationObserver(() => {
        if (slot.querySelector(".stat-tile-row, .aeo-geo-widget__error")) {
          setBusy(false);
          observer.disconnect();
        }
      });
      observer.observe(slot, { childList: true, subtree: true });
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      if (button.disabled) return; // already analyzing, ignore re-entrant submits

      const targetUrl = normalizeUrl(input.value);

      if (!targetUrl || !isPlausibleUrl(targetUrl)) {
        input.classList.add("is-invalid");
        fieldError.textContent = "Enter a valid website URL.";
        return;
      }

      input.classList.remove("is-invalid");
      fieldError.textContent = "";
      slot.innerHTML = "";
      setBusy(true);
      watchForCompletion();

      const script = document.createElement("script");
      script.src = "/widget.js";
      script.setAttribute("data-url", targetUrl);
      script.setAttribute("data-api-base", API_BASE);
      slot.appendChild(script);
    });
  </script>
</body>
</html>
