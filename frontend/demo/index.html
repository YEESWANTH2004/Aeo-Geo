<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AEO/GEO Widget Demo</title>
  <style>
    body {
      background: #0b0d11;
      color: #e6e8eb;
      font-family: sans-serif;
      padding: 40px;
    }
  </style>
</head>
<body>
  <h1>AEO/GEO Widget Demo</h1>
  <p>The widget below auto-analyzes the target URL set in <code>data-url</code>.</p>

  <!-- Update this src to your deployed backend URL (e.g. https://your-app.onrender.com/widget.js)
       once the backend is deployed. Locally it points at your dev server. -->
  <script
    src="http://localhost:3000/widget.js"
    data-url="https://example.com">
  </script>
</body>
</html>
