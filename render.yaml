services:
  - type: web
    name: aeo-geo-backend
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /health

  - type: web
    name: aeo-geo-frontend
    runtime: static
    buildCommand: "true"
    staticPublishPath: ./frontend
    headers:
      - path: "/*.js"
        name: Content-Type
        value: text/javascript; charset=utf-8
      - path: "/**/*.js"
        name: Content-Type
        value: text/javascript; charset=utf-8
      - path: "/*.css"
        name: Content-Type
        value: text/css; charset=utf-8
      - path: "/**/*.css"
        name: Content-Type
        value: text/css; charset=utf-8
